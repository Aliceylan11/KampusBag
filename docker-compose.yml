version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: KampusBagDB
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=KampusBagDB
    ports:
      - "5433:5432" # Laptopundaki Postgres ile çakışmaması için 5433 devam
    volumes:
      - pgdata:/var/lib/postgresql # Buradaki /data kısmını sildik!

volumes:
  pgdata: